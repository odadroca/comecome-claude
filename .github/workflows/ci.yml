name: CI

# PR-gating CI. Runs the full suite on a clean Linux box on every PR/push (lifting
# the "Hostinger-untested" residual risk) + a secret scan + a committed-database
# guard (A17 Part 1), and builds + Trivy-scans the Docker image (A10 — verifies the
# Dockerfile builds on Linux). SBOM + cosign-sign + GHCR publish remain A17 Part 2.
# Third-party actions are pinned to a commit SHA.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Lint & test suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5 (Node 24)
      - uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: '8.3'
          extensions: sodium, pdo_sqlite, sqlite3
          coverage: none
      - name: Lint PHP (php -l)
        shell: bash
        run: |
          status=0
          while IFS= read -r f; do
            php -l "$f" > /dev/null || { echo "::error file=$f::PHP syntax error"; status=1; }
          done < <(git ls-files '*.php')
          exit $status
      - name: Test suite (php tests/run.php)
        run: php tests/run.php

  secret-scan:
    name: Secret scan & no-DB guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5 (Node 24)
        with:
          fetch-depth: 0
      - name: gitleaks (full history)
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0 (Node 24; no license)
        env:
          GITHUB_TOKEN: ${{ github.token }}
      - name: No database files tracked
        shell: bash
        run: |
          # Second line of defence behind .gitignore (PR #37): this repo holds
          # children's-health data and `main` auto-deploys — a tracked DB must never exist.
          # Mirror the broadened ignore shape (*.db-* / *.sqlite-* / *.sqlite3-*): a .db/
          # .sqlite/.sqlite3 base, optionally followed by ANY -suffix — so not just the
          # -wal/-shm/-journal sidecars but also backups/copies (prod.db-backup, data.sqlite-copy).
          if git ls-files | grep -E '\.(db|sqlite3?)(-.*)?$'; then
            echo "::error::A database/SQLite-derived file is tracked in git — must never be committed."
            exit 1
          fi
          echo "OK: no database/SQLite files tracked."

  docker-build:
    name: Docker image build & scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5 (Node 24)
      - name: Build image (verifies the Dockerfile builds on Linux)
        run: docker build -t comecome:ci .
      - name: Trivy image scan (report-only; enforcement is A17 Part 2)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: comecome:ci
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '0'
