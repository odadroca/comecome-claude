# ComeCome — self-host stack: the PHP/Apache app + Caddy for automatic HTTPS.
#
# Quick start:
#   docker compose up --build
#   open https://localhost   (accept the local-CA warning once)
#
# Data persists in the named volume `comecome-data` (the SQLite DB lives there,
# outside the web root). To update: `git pull && docker compose up --build -d`.

services:
  comecome:
    build: .
    image: ghcr.io/odadroca/comecome:latest
    environment:
      COMECOME_DB_PATH: /data/data.db
      # COMECOME_FORCE_HTTPS: "1"   # optional PHP-level HTTP->HTTPS backstop
      # COMECOME_CONFIG: /run/secrets/comecome.php   # above-docroot secrets/key
    volumes:
      - comecome-data:/data
    expose:
      - "80"
    restart: unless-stopped

  # Demo setup (opt-in). `docker compose --profile demo up` runs this once to populate the
  # shared volume with ~90 days of demo data AND clear the first-run gates (sets the published
  # demo guardian PIN + records consent), so the advertised demo logins open the app; then it exits.
  # Plain `docker compose up` does NOT start it. NOTE: this writes the shared `comecome-data`
  # volume — to return to a clean EMPTY install afterwards, run `docker compose down -v` (or run the
  # demo in its own project: `docker compose -p comecome-demo --profile demo up`).
  seed:
    build: .
    image: ghcr.io/odadroca/comecome:latest
    profiles: ["demo"]
    # Run as www-data (the user Apache serves as) so the DB this creates is writable
    # by the app. As root the DB would be root-owned and read-only to the app (500s).
    user: "www-data"
    command: ["php", "scripts/demo-setup.php"]
    environment:
      COMECOME_DB_PATH: /data/data.db
    volumes:
      - comecome-data:/data
    restart: "no"

  # Public-demo auto-reset (opt-in). `docker compose --profile sandbox up` runs the
  # app + a sidecar that restores a pristine demo every SANDBOX_RESET_INTERVAL seconds
  # (default 2h) via scripts/demo-setup.php --reset (wipe -> seed -> set the published demo
  # guardian PIN -> record consent). FOR A PUBLIC DEMO ONLY — it WIPES the database each cycle.
  # Host-cron alternative: docker compose exec -T -u www-data comecome php scripts/demo-setup.php --reset
  reset:
    build: .
    image: ghcr.io/odadroca/comecome:latest
    profiles: ["sandbox"]
    user: "www-data"            # same uid as the app — the DB it writes must be app-writable
    environment:
      COMECOME_DB_PATH: /data/data.db
      SANDBOX_RESET_INTERVAL: "7200"   # 2 hours
      SANDBOX_GUARDIAN_PIN: "1425"     # published demo guardian PIN (non-default → force-change gate stays off)
    volumes:
      - comecome-data:/data
    entrypoint: ["sh", "-c", "php scripts/demo-setup.php --reset; while true; do sleep \"$$SANDBOX_RESET_INTERVAL\"; php scripts/demo-setup.php --reset; done"]
    restart: unless-stopped

  caddy:
    image: caddy:2
    depends_on:
      - comecome
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    restart: unless-stopped

volumes:
  comecome-data:
  caddy-data:
  caddy-config:
