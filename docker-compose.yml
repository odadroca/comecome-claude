# ComeCome — self-host stack: the PHP/Apache app + Caddy for automatic HTTPS.
#
# Quick start:
#   docker compose up --build
#   open https://localhost   (accept the local-CA warning once)
#
# Data persists in the named volume `comecome-data` (the SQLite DB lives there,
# outside the web root). To update: `git pull && docker compose up --build -d`.

services:
  comecome:
    build: .
    image: ghcr.io/odadroca/comecome:latest
    environment:
      COMECOME_DB_PATH: /data/data.db
      # COMECOME_FORCE_HTTPS: "1"   # optional PHP-level HTTP->HTTPS backstop
      # COMECOME_CONFIG: /run/secrets/comecome.php   # above-docroot secrets/key
    volumes:
      - comecome-data:/data
    expose:
      - "80"
    restart: unless-stopped

  # Demo-data seeder (opt-in). `docker compose --profile demo up` runs this once to
  # populate the shared volume with ~90 days of realistic demo data, then it exits.
  # Plain `docker compose up` does NOT start it (clean empty install). Re-seed with:
  #   docker compose --profile demo run --rm seed php db/seed-demo.php --reset
  seed:
    build: .
    image: ghcr.io/odadroca/comecome:latest
    profiles: ["demo"]
    # Run as www-data (the user Apache serves as) so the DB this creates is writable
    # by the app. As root the DB would be root-owned and read-only to the app (500s).
    user: "www-data"
    command: ["php", "db/seed-demo.php"]
    environment:
      COMECOME_DB_PATH: /data/data.db
    volumes:
      - comecome-data:/data
    restart: "no"

  caddy:
    image: caddy:2
    depends_on:
      - comecome
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    restart: unless-stopped

volumes:
  comecome-data:
  caddy-data:
  caddy-config:
